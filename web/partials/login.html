<div id="empleado-login-form">
<label class="login-label" for="login-pass" id="login-pass-label">Contraseña</label><input
 class="login-input"
 type="password"
 id="login-pass"
 placeholder="••••••••"
 autocomplete="current-password"
 onkeydown="if (event.key === 'Enter') doLogin();"
 /><label class="login-recordar" style="margin-bottom:1rem;"><input type="checkbox" id="login-recordar" /><span>Recordar en este equipo</span></label><button class="login-btn" onclick="doLogin()">Entrar</button>
</div>
<div id="policia-login-form" style="display:none;">
  <div id="pol-login-error" class="login-error" style="margin-bottom:0.5rem;"></div>
  <label class="login-label" for="pol-login-user">Usuario</label>
  <input class="login-input" type="text" id="pol-login-user" placeholder="Nombre de usuario" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('pol-login-pass').focus();" />
  <label class="login-label" for="pol-login-pass" style="margin-top:0.5rem;">Contraseña</label>
  <input class="login-input" type="password" id="pol-login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLoginPolicia();" />
  <label class="login-recordar" style="margin:0.6rem 0 0.8rem;"><input type="checkbox" id="pol-login-recordar" /><span>Recordar en este equipo</span></label>
  <button class="login-btn" onclick="doLoginPolicia()">Entrar como policía</button>
</div>
<div style="margin-top:1rem;padding-top:0.9rem;border-top:1px solid var(--borde);">
  <button type="button" id="btn-toggle-policia" class="btn btn-secondary" style="width:100%;font-size:0.8rem;" onclick="togglePoliciaLogin()">
    Acceso de Policía Municipal
  </button>
</div>
<p class="login-footer">Acceso exclusivo para personal municipal autorizado</p></div></div></div>
<!-- Modal setup contraseña (primera vez, cualquier IP) -->
<div id="modal-setup-admin" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
  <div style="background:var(--blanco);padding:2rem 2.2rem;max-width:420px;width:92%;border-top:4px solid var(--rojo);">
    <h2 style="font-family:'Libre Baskerville',serif;font-size:1.05rem;margin-bottom:0.3rem;color:var(--tinta);">Primera conexión</h2>
    <p id="setup-desc" style="font-size:0.8rem;color:var(--gris4);margin-bottom:1.2rem;line-height:1.5;">Crea tu contraseña de acceso para este equipo.</p>
    <div id="setup-error" style="display:none;color:var(--rojo);font-size:0.8rem;margin-bottom:0.8rem;"></div>
    <label id="setup-pass-label" style="display:block;font-size:0.78rem;color:var(--gris4);margin-bottom:0.3rem;">Nueva contraseña (mín. 6 caracteres)</label>
    <input type="password" id="setup-pass1" class="login-input" placeholder="••••••••" style="margin-bottom:0.8rem;" onkeydown="if(event.key==='Enter')document.getElementById('setup-pass2').focus();" />
    <label style="display:block;font-size:0.78rem;color:var(--gris4);margin-bottom:0.3rem;">Confirmar contraseña</label>
    <input type="password" id="setup-pass2" class="login-input" placeholder="••••••••" style="margin-bottom:1.2rem;" onkeydown="if(event.key==='Enter')doSetupAdmin();" />
    <button class="login-btn" onclick="doSetupAdmin()" style="width:100%;">Establecer contraseña</button>
  </div>
</div>
<!-- Modal cambiar contraseña -->
<div id="modal-cambiar-pass" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
  <div style="background:var(--blanco);padding:2rem 2.2rem;max-width:420px;width:92%;border-top:4px solid var(--rojo);">
    <h2 id="cambiar-pass-title" style="font-family:'Libre Baskerville',serif;font-size:1.05rem;margin-bottom:1rem;color:var(--tinta);">Cambiar contraseña</h2>
    <div id="cambiar-error" style="display:none;color:var(--rojo);font-size:0.8rem;margin-bottom:0.8rem;"></div>
    <div id="cambiar-ok" style="display:none;color:var(--verde);font-size:0.8rem;margin-bottom:0.8rem;"></div>
    <label style="display:block;font-size:0.78rem;color:var(--gris4);margin-bottom:0.3rem;">Contraseña actual</label>
    <input type="password" id="cambiar-actual" class="login-input" placeholder="••••••••" style="margin-bottom:0.8rem;" />
    <label id="cambiar-nueva-label" style="display:block;font-size:0.78rem;color:var(--gris4);margin-bottom:0.3rem;">Nueva contraseña (mín. 6 caracteres)</label>
    <input type="password" id="cambiar-nueva1" class="login-input" placeholder="••••••••" style="margin-bottom:0.8rem;" />
    <label style="display:block;font-size:0.78rem;color:var(--gris4);margin-bottom:0.3rem;">Confirmar nueva contraseña</label>
    <input type="password" id="cambiar-nueva2" class="login-input" placeholder="••••••••" style="margin-bottom:1.2rem;" />
    <div style="display:flex;gap:0.8rem;">
      <button class="btn btn-secondary" onclick="cerrarModalCambiarPass()" style="flex:1;">Cancelar</button>
      <button class="btn btn-enviar" onclick="doCambiarPass()" style="flex:1;">Guardar</button>
    </div>
  </div>
</div>
