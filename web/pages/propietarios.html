<div class="page active" id="page-propietarios"><div class="section-header"><span class="section-num">FORM-01</span><h2>Alta de Propietario</h2><p>Registro de nuevo titular en el padrón municipal</p></div><div id="alert-prop" class="alert"><span class="alert-icon"></span><span class="alert-msg"></span></div><form id="form-prop" onsubmit="submitPropietario(event)"><div class="bloque"><div class="bloque-titulo"><h3>Datos personales</h3><span class="req-label">* campos obligatorios</span></div><div class="bloque-body"><div class="form-grid"><div class="form-group"><label>DNI / NIE <span class="req">*</span></label><input

 validarDNI(this);

 "
 /><span class="dni-hint" id="hint-prop-dni"></span></div><div class="form-group"><label>Nombre <span class="req">*</span></label><input

 required
 /></div><div class="form-group"><label>Primer Apellido <span class="req">*</span></label><input

 name="PRIMER_APELLIDO"
 placeholder="Primer apellido"
 required
 /></div><div class="form-group"><label>Segundo Apellido</label><input
 type="text"
 name="SEGUNDO_APELLIDO"
 placeholder="Segundo apellido"
 /></div><div class="form-group"><label>Teléfono principal</label><input

 name="TELEFONO1"

 /></div><div class="form-group"><label>Teléfono secundario</label><input

 name="TELEFONO2"

 maxlength="15"
 inputmode="tel"
 autocomplete="tel"
 /></div></div></div></div><div class="bloque"><div class="bloque-titulo"><h3>Domicilio</h3></div><div class="bloque-body"><div class="form-grid"><div class="form-group span2"><label>Domicilio</label><input

 /></div><div class="form-group"><label>Código Postal</label><input
 type="text"
 name="CP"

 /></div><div class="form-group"><label>Municipio</label><input type="text" name="MINICIPIO" placeholder="Madrid" /></div></div></div></div><div class="btn-row"><button type="submit" class="btn btn-primary" id="btn-prop"><div class="spinner" id="sp-prop"></div><span>Registrar propietario</span></button><button
