<div class="page" id="page-animales"><div class="section-header"><span class="section-num">FORM-02</span><h2>Alta de Animal</h2><p>Inscripción de mascota en el censo municipal</p></div><div id="alert-anim" class="alert"><span class="alert-icon"></span><span class="alert-msg"></span></div><form id="form-anim" enctype="multipart/form-data" onsubmit="submitAnimal(event)"><div class="bloque"><div class="bloque-titulo"><h3>Identificación</h3><span class="req-label">* campos obligatorios</span></div><div class="bloque-body"><div class="form-grid"><div class="form-group"><label>N.º de chip <span class="req">*</span></label><input
