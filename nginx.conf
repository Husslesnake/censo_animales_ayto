server {
    listen 80;

    # Sirve el HTML
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Redirige /api/* al contenedor Flask
    location /api/ {
        proxy_pass         http://api:5000/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
