# Resolver DNS interno de Docker (resuelve nombres de servicio en tiempo de peticion)
resolver 127.0.0.11 valid=10s ipv6=off;

# -- Puerto 80 -- Empleados (acceso publico) ------------------------------------
server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $backend http://api:5000;
        proxy_pass         $backend/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Admin-Access "";
    }
}

# -- Puerto 8080 -- Administrador (solo localhost) ------------------------------
server {
    listen 8181;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $backend http://api:5000;
        proxy_pass         $backend/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $remote_addr;
        proxy_set_header   X-Admin-Access "true";
    }
}
