version: "3.8"

services:

  mariadb:
    image: mariadb:10.11
    container_name: censo_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123"
      MYSQL_DATABASE: censo_animales
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - red_censo
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: censo_api
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: "123"
      DB_NAME: censo_animales
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - red_censo

  web:
    image: nginx:alpine
    container_name: censo_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - red_censo

volumes:
  mariadb_data:

networks:
  red_censo:
    driver: bridge
