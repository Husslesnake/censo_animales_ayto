services:
  mariadb:
    image: mariadb:10.11
    container_name: censo_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123"
      MYSQL_DATABASE: censo_animales
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/censo_animales.sql:/docker-entrypoint-initdb.d/01-censo_animales.sql:ro
    networks:
      - red_censo
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: censo_api
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: "123"
      DB_NAME: censo_animales
      LOG_DIR: /app/logs
      AUTH_FILE: /app/auth.json
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./auth.json:/app/auth.json
    networks:
      - red_censo

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: censo_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: "123"
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - red_censo

  web:
    image: nginx:alpine
    container_name: censo_web
    restart: unless-stopped
    ports:
      - "80:80"                  # Empleados — acceso público
      - "127.0.0.1:8181:8181"   # Admin — solo desde localhost (el servidor)
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - red_censo

volumes:
  mariadb_data:
    name: censo_animales_mariadb_data

networks:
  red_censo:
    driver: bridge